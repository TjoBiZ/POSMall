        _available_above_totals:
            label: 'kodzero.posmall::lang.shipping_method.available_above_total'
            oc.commentPosition: ''
            span: auto
            type: posmall.price
            tab: 'kodzero.posmall::lang.common.conditions'
            context: update
        countries:
            label: 'kodzero.posmall::lang.shipping_method.countries'
            nameFrom: name
            descriptionFrom: description
            span: auto
            type: relation
            comment: 'kodzero.posmall::lang.shipping_method.countries_comment'
            tab: 'kodzero.posmall::lang.common.conditions'
            context: update
        rates:
            span: auto
            path: $/kodzero/posmall/controllers/shippingmethods/_rates.htm
            type: partial
            tab: 'kodzero.posmall::lang.common.conditions'

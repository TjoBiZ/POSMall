fields:
    is_enabled:
        type: switch
        label: kodzero.posmall::lang.shipping_method_settings.is_enabled
        span: left
        default: true
    is_default:
        type: switch
        label: kodzero.posmall::lang.shipping_method_settings.set_as_default
        span: right
tabs:

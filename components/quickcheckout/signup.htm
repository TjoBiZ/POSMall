<div class="mall-quick-checkout__address">
    <div class="mall-form-control mb-3">
        <label for="signup_email" class="form-label">{{ 'kodzero.posmall::frontend.form.email'|trans }}</label>
        <input id="signup_email" class="form-control" type="email" placeholder="email@email.com" name="email">
        <div data-validate-for="email" class="invalid-feedback d-block"></div>
    </div>
    <p class="mall-quick-checkout__sign-in-link text-muted">
        {{ 'kodzero.posmall::frontend.form.already_registered'|trans }}
        <a href="{{ __SELF__.loginPage|page }}?redirect={{ __SELF__.currentPage }}">{{ 'kodzero.posmall::frontend.form.signin'|trans }}</a>
    </p>
    <div class="mall-two-fields row g-3">
        <div class="mall-form-control col-12 col-md-6">
            <label for="firstname" class="form-label">{{ 'kodzero.posmall::frontend.form.firstname'|trans }}</label>
            <input id="firstname" class="form-control" type="text" name="firstname">
            <div data-validate-for="firstname" class="invalid-feedback d-block"></div>
        </div>
        <div class="mall-form-control col-12 col-md-6">
            <label for="lastname" class="form-label">{{ 'kodzero.posmall::frontend.form.lastname'|trans }}</label>
            <input id="lastname" class="form-control" type="text" name="lastname">
            <div data-validate-for="lastname" class="invalid-feedback d-block"></div>
        </div>
    </div>

    <div class="mall-quick-checkout__guest-option form-check my-3">
        <input class="js-mall-toggle-guest-signup form-check-input"
                   id="quick_as_guest"
                   type="checkbox" name="as_guest"
                   value="1">
        <label class="mall-checkbox form-check-label" for="quick_as_guest">
            {{ 'kodzero.posmall::frontend.signup.as_guest'|trans }}
        </label>
    </div>

    <div class="mall-quick-checkout__password-inputs">
        <div class="mall-two-fields row g-3">
            <div class="mall-form-control col-12 col-md-6">
                <label
                    for="signup_password" class="form-label">{{ 'kodzero.posmall::frontend.form.password'|trans }}</label>
                <input id="signup_password" class="form-control" type="password" name="password">
                <div data-validate-for="password" class="invalid-feedback d-block"></div>
            </div>
            <div class="mall-form-control col-12 col-md-6">
                <label
                    for="password_repeat" class="form-label">{{ 'kodzero.posmall::frontend.form.password_repeat'|trans }}</label>
                <input id="password_repeat" class="form-control" type="password" name="password_repeat">
                <div data-validate-for="password_repeat" class="invalid-feedback d-block"></div>
            </div>
        </div>
    </div>

    <div class="mall-quick-checkout__billing-address mt-4">
        {% partial __SELF__ ~ '::addressform' type='billing' %}

        <div class="mall-quick-checkout__shipping-address-option form-check my-3">
            <input class="js-mall-toggle-shipping-address form-check-input"
                       id="quick_use_different_shipping"
                       type="checkbox"
                       name="use_different_shipping" value="1">
            <label class="mall-checkbox form-check-label" for="quick_use_different_shipping">
                {{ 'kodzero.posmall::frontend.signup.different_address'|trans }}
            </label>
        </div>
    </div>

    <div class="mall-shipping-address mt-4" style="display: none;">
        <h2 class="mall-quick-checkout__heading h5">
            {{ 'kodzero.posmall::frontend.shipping_address'|trans }}
        </h2>
        {% partial __SELF__ ~ '::addressform' type='shipping' %}
    </div>
</div>

<div class="mall-wishlist-item">
    <div class="mall-wishlist-item__data">
        <div class="mall-wishlist-item__name">
            {{ label|default('kodzero.posmall::frontend.wishlist.default_name'|trans) }}
        </div>
        <div class="mall-wishlist-item__description">
            {{ 'kodzero.posmall::frontend.wishlist.count'|transchoice(count|default(0), { count: count|default(0) }) }}
        </div>
    </div>
    <div class="mall-wishlist-item__action text-end">
        <div class="mall-wishlist-item__meta mb-2">
            {{ (total|default(0))|money }}
        </div>
        <button type="button"
                class="btn btn-primary btn-sm text-nowrap"
                data-request="onAdd"
                data-request-flash
                data-request-success="
                    window.POSMallFavoriteAdded && window.POSMallFavoriteAdded(data);
                    document.querySelectorAll('.mall-wishlist-button__popup').forEach(function (popup) { popup.classList.remove('mall-wishlist-button__popup--visible'); });
                "
                data-request-data="
                    wishlist_id: '{{ list_id|default() }}',
                    product_id: '{{ __SELF__.encode(product_id) }}',
                    variant_id: '{{ __SELF__.encode(variant_id) }}'
                ">
            Add to this list
        </button>
    </div>
</div>

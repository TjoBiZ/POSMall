<div class="mall-property-group mb-3">
    <div class="mall-property-group__name fw-semibold mb-2">
        {{ 'kodzero.posmall::frontend.categories'|trans }}
    </div>
    <div class="mall-filter mall-filter--categories">
        {% set selected = filter['category_id'].values|default([]) %}

        {% partial __SELF__ ~ '::clearfilter' id='category_id' %}

        {% partial __SELF__ ~ '::category_checkboxes' categories=__SELF__.categoryFilterCategories|default([]) level=1 %}
    </div>
</div>

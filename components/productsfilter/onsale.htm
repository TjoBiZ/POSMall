<div class="mall-filter mall-filter--on-sale">
    <label for="mall-on-sale" class="mall-label mall-label--checkbox js-mall-filter form-check">
        <input type="checkbox" class="mall-input-checkbox form-check-input" id="mall-on-sale"
                name="filter[on_sale]"
                value="✓"
                {{ (filter['on_sale']|default(false)) ? 'checked' : '' }}
        >
        <span class="form-check-label">{{ 'kodzero.posmall::frontend.onsale_label'|trans }}</span>
    </label>
</div>

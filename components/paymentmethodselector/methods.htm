<p class="text-muted">{{ 'kodzero.posmall::frontend.payment_method.choose'|trans }}</p>

<form id="mall-payment-form" data-request-validate data-component-alias="{{ __SELF__ }}">
    {{ form_token() }}
    <div class="mall-payment-method__errors invalid-feedback d-block mb-3" data-payment-error></div>
    <div class="mall-payment-method d-grid gap-3">
        {% for method in __SELF__.methods %}
            {% partial __SELF__ ~ '::method' method=method %}
        {% else %}
            <div class="alert alert-warning mb-0">
                {{ 'kodzero.posmall::frontend.payment_method.none_available'|trans }}
            </div>
        {% endfor %}
    </div>
</form>

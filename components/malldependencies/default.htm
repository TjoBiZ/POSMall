{% put scripts %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@materialstyle/materialstyle@3.1.1/dist/js/materialstyle.min.js" integrity="sha384-rqhP61M9WSmzd7+ssgyoWP2I+R68vVHx7o+UmmIs6/Nxe8Lt1DoF6+0CKptZIXC0" crossorigin="anonymous"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    window.Mall = window.Mall || {};

    /**
     * Create a tiny modal adapter around a native DOM element.
     *
     * This keeps compatibility with existing Mall partials that call:
     * - window.Mall.Modal.addClass(...)
     * - window.Mall.Modal.removeClass(...)
     * - window.Mall.Modal.prependTo(...)
     *
     * The adapter intentionally exposes only the methods used by KodZero.POSMall partials.
     */
    function createMallModalAdapter() {
        const modalElement = document.createElement('div');

        modalElement.className = 'mall-modal';

        modalElement.addEventListener('click', function (event) {
            if (event.target.classList.contains('mall-modal')) {
                modalElement.classList.remove('mall-modal--visible');
            }
        });

        document.body.prepend(modalElement);

        return {
            element: modalElement,

            addClass: function (className) {
                modalElement.classList.add(className);
                return this;
            },

            removeClass: function (className) {
                modalElement.classList.remove(className);
                return this;
            },

            prependTo: function (target) {
                const parent = typeof target === 'string'
                    ? document.querySelector(target)
                    : target;

                if (parent) {
                    parent.prepend(modalElement);
                }

                return this;
            },

            show: function () {
                modalElement.style.display = '';
                return this;
            },

            hide: function () {
                modalElement.style.display = 'none';
                return this;
            }
        };
    }

    if (!window.Mall.Modal || !window.Mall.Modal.element) {
        window.Mall.Modal = createMallModalAdapter();
    }

    window.Mall.Callbacks = window.Mall.Callbacks || {};
    window.Mall.Callbacks.Checkout = window.Mall.Callbacks.Checkout || [];
});
</script>
{% endput %}
